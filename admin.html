<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo | Constructora Rodríguez Javier</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --color-primary: hsl(24, 95%, 50%);
      --color-secondary: hsl(218, 23%, 15%);
      --color-dark: hsl(220, 25%, 10%);
      --color-light: hsl(210, 20%, 98%);
      --color-white: #ffffff;
      --color-gray: #94a3b8;
    }
    
    body {
      background-color: var(--color-dark);
      color: var(--color-light);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    .admin-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
    }

    .admin-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      margin: 0;
      color: var(--color-white);
    }

    .admin-header h1 span {
      color: var(--color-primary);
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    @media (max-width: 968px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }

    .glass-card {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .glass-card h2 {
      font-family: 'Outfit', sans-serif;
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--color-gray);
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--color-white);
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(240, 98, 30, 0.25);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .btn-admin {
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-admin:hover {
      background: hsl(24, 95%, 45%);
      transform: translateY(-2px);
    }

    .btn-admin:active {
      transform: translateY(0);
    }

    .btn-admin:disabled {
      background: var(--color-gray);
      cursor: not-allowed;
      transform: none;
    }

    /* Auth modal overlay */
    #auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color-dark);
      z-index: 999999;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-box {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }

    .auth-box h2 {
      font-family: 'Outfit', sans-serif;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .auth-box p {
      color: var(--color-gray);
      margin-bottom: 30px;
    }

    .image-preview-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .preview-box {
      position: relative;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-box .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(220, 38, 38, 0.85);
      border: none;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Property Listing in Admin */
    .property-list-item {
      display: flex;
      gap: 15px;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .property-list-item img {
      width: 80px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
    }

    .property-list-info {
      flex: 1;
    }

    .property-list-title {
      font-weight: 600;
      font-size: 1rem;
      margin: 0;
    }

    .property-list-meta {
      font-size: 0.85rem;
      color: var(--color-gray);
      margin: 4px 0 0 0;
    }

    .property-list-actions {
      display: flex;
      gap: 10px;
    }

    .btn-action {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--color-light);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .btn-action.delete {
      border-color: rgba(220, 38, 38, 0.4);
      color: #ef4444;
    }

    .btn-action.delete:hover {
      background: rgba(220, 38, 38, 0.1);
    }

    .btn-action:hover {
      background: rgba(255,255,255,0.08);
    }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.en_venta {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
    }

    .status-badge.en_desarrollo {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
    }

    .setup-config {
      margin-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 20px;
    }
  </style>
</head>
<body>

  <!-- AUTH PORTAL OVERLAY -->
  <div id="auth-overlay">
    <div class="auth-box glass-card">
      <h2>Acceso <span>Administrativo</span></h2>
      <p>Ingresa la contraseña de Supabase para desbloquear el panel.</p>
      <div class="form-group">
        <input type="password" id="admin-password" class="form-control" placeholder="Contraseña de Supabase...">
      </div>
      <button id="btn-login" class="btn-admin">Acceder al Panel</button>
      <p id="auth-error" style="color: #ef4444; margin-top: 15px; display: none; font-size: 0.9rem;"></p>
    </div>
  </div>

  <!-- MAIN ADMIN DASHBOARD -->
  <div class="admin-container">
    <div class="admin-header">
      <h1>Panel <span>Bienes Raíces</span></h1>
      <button onclick="window.location.href='index.html'" class="btn-action">← Volver al Sitio Web</button>
    </div>

    <div class="admin-grid">
      <!-- FORM TO CREATE PROPERTY -->
      <div class="glass-card">
        <h2 id="form-heading">Agregar Nuevo Proyecto</h2>
        <form id="property-form">
          <input type="hidden" id="property-id">
          
          <div class="form-group">
            <label for="title">Título del Proyecto / Propiedad</label>
            <input type="text" id="title" class="form-control" required placeholder="Ej. Residencial Rodríguez Javier I">
          </div>

          <div class="form-group">
            <label for="description">Descripción del Proyecto</label>
            <textarea id="description" class="form-control" rows="4" required placeholder="Detalla las características del proyecto, terminaciones, financiamiento..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="price">Precio (USD)</label>
              <input type="number" id="price" class="form-control" required placeholder="Ej. 135000">
            </div>
            <div class="form-group">
              <label for="location">Ubicación</label>
              <input type="text" id="location" class="form-control" required value="Prado Oriental, Santo Domingo Este">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="m2">Metros Cuadrados (m²)</label>
              <input type="number" step="0.01" id="m2" class="form-control" required placeholder="Ej. 145">
            </div>
            <div class="form-group">
              <label for="status">Estado del Proyecto</label>
              <select id="status" class="form-control" required>
                <option value="en_desarrollo">En Preventa / Construcción</option>
                <option value="en_venta">En Venta (Listo)</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="bedrooms">Habitaciones</label>
              <input type="number" id="bedrooms" class="form-control" required placeholder="3">
            </div>
            <div class="form-group">
              <label for="bathrooms">Baños</label>
              <input type="number" id="bathrooms" class="form-control" required placeholder="2">
            </div>
          </div>

          <div class="form-group">
            <label for="parking">Parqueos</label>
            <input type="number" id="parking" class="form-control" required value="2">
          </div>

          <div class="form-group">
            <label for="images-upload">Imágenes del Proyecto (WebP/PNG/JPG)</label>
            <input type="file" id="images-upload" class="form-control" multiple accept="image/*">
            <div class="image-preview-container" id="preview-container"></div>
          </div>

          <button type="submit" id="btn-submit" class="btn-admin">Publicar Propiedad</button>
          <button type="button" id="btn-cancel" class="btn-action" style="width: 100%; margin-top: 10px; display: none;">Cancelar Edición</button>
        </form>
      </div>

      <!-- LIST OF EXISTING PROPERTIES -->
      <div class="glass-card">
        <h2>Proyectos Registrados</h2>
        <div id="properties-list">
          <p style="color: var(--color-gray);">Cargando propiedades...</p>
        </div>

        <!-- SETUP CONFIGURATION SETTINGS FOR SUPABASE -->
        <div class="setup-config">
          <h3 style="margin-top: 0; font-family: 'Outfit'; font-size: 1.1rem; color: var(--color-white);">Configuración de Supabase</h3>
          <div class="form-group">
            <label for="supabase-url">Supabase URL</label>
            <input type="text" id="supabase-url" class="form-control" value="https://rnkktolpevqpcyvessfn.supabase.co" placeholder="https://your-project.supabase.co">
          </div>
          <div class="form-group">
            <label for="supabase-anon-key">Supabase Anon/Public Key</label>
            <input type="password" id="supabase-anon-key" class="form-control" placeholder="Introduce tu anon key pública...">
          </div>
          <button id="btn-save-config" class="btn-admin" style="background: transparent; border: 1px solid var(--color-primary); color: var(--color-primary);">Guardar Claves</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
